{% load static %}
<!doctype html><html lang="en" data-theme="light"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register — mero dokan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/datafast.css' %}"></head>
<body><div class="container" style="max-width:460px;padding-top:56px">
  <div class="logo" style="margin-bottom:24px"><span class="mark">md</span> Mero Dokan</div>
  <h1 style="font-size:32px;letter-spacing:-1px">Create your account</h1>
  <p class="muted">Accounts require admin approval before first login.</p>
  {% if form.errors %}<div class="msg error">{% for f,errs in form.errors.items %}{{ f }}: {{ errs|join:", " }}<br>{% endfor %}</div>{% endif %}
  <form method="post" style="display:flex;flex-direction:column;gap:14px;margin-top:14px">
    {% csrf_token %}
    <div class="input"><input name="username" placeholder="Username" required></div>
    <div class="input"><input name="email" type="email" placeholder="Email" required></div>
    <div class="input"><input name="password1" type="password" placeholder="Password" required></div>
    <div class="input"><input name="password2" type="password" placeholder="Confirm password" required></div>
    <button class="btn" type="submit">Register</button>
  </form>
  <p class="muted" style="margin-top:16px">Have an account?
    <a href="{% url 'users:login' %}">Log in</a></p>
</div></body></html>
