services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-datafast}
      POSTGRES_USER: ${POSTGRES_USER:-datafast}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datafast}
    volumes: [pgdata:/var/lib/postgresql/data]
    ports: ["5432:5432"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  web:
    build: .
    command: >
      sh -c "python manage.py makemigrations users core uploads processing analytics &&
             python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes: [".:/app", "media:/app/media"]
    ports: ["8000:8000"]
    depends_on: [db, redis]

  worker:
    build: .
    command: celery -A config worker -l info
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes: [".:/app", "media:/app/media"]
    depends_on: [db, redis]

volumes:
  pgdata:
  media:
